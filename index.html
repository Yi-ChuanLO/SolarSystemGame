<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真實尺度太陽系 N-body 引力模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <!-- 3D 渲染容器 -->
    <div id="canvas-container"></div>

    <!-- UI 控制介面 -->
    <div id="ui-layer" class="p-6 flex flex-col justify-between">
        <div
            class="pointer-events-auto bg-black/50 backdrop-blur-md border border-white/20 p-6 rounded-2xl max-w-sm shadow-2xl">
            <div class="flex justify-between items-center mb-2">
                <h1
                    class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                    太陽系 N-body 模擬</h1>
                <button id="toggle-ui-btn" class="text-xl text-gray-400 hover:text-white transition-colors"
                    title="摺疊/展開選單">🔽</button>
            </div>

            <div id="ui-content" class="transition-all duration-300">
                <p class="text-sm text-gray-300 mb-4 border-b border-white/20 pb-4">
                    初始化中…
                </p>

                <div class="mb-4 flex gap-2">
                    <button id="mode-view"
                        class="flex-1 py-1.5 px-2 bg-blue-600 rounded-lg text-sm font-bold border border-blue-400 transition-colors">👀
                        觀察模式</button>
                    <button id="mode-place"
                        class="flex-1 py-1.5 px-2 bg-white/10 rounded-lg text-sm font-bold border border-white/20 hover:bg-white/20 transition-colors">➕
                        放置模式</button>
                </div>

                <div class="mb-4">
                    <p class="text-sm font-semibold text-gray-400 mb-2">生成極端天體 (點擊畫面放置)</p>
                    <div class="grid grid-cols-1 gap-2">
                        <button id="btn-wd"
                            class="celestial-btn py-2 px-4 rounded-lg bg-white/10 hover:bg-blue-500/30 border border-white/10 transition-all text-left flex justify-between items-center"
                            data-type="wd">
                            <span>⚪ 白矮星</span> <span class="text-xs text-blue-300">1.2 M☉</span>
                        </button>
                        <button id="btn-ns"
                            class="celestial-btn py-2 px-4 rounded-lg bg-white/10 hover:bg-cyan-500/30 border border-white/10 transition-all text-left flex justify-between items-center"
                            data-type="ns">
                            <span>✨ 中子星</span> <span class="text-xs text-cyan-300">2.0 M☉</span>
                        </button>
                        <button id="btn-bh"
                            class="celestial-btn py-2 px-4 rounded-lg bg-white/10 hover:bg-purple-600/50 border border-white/10 transition-all text-left flex justify-between items-center shadow-[0_0_15px_rgba(168,85,247,0.5)]"
                            data-type="bh">
                            <span>🕳️ 恆星黑洞</span> <span class="text-xs text-purple-300">50.0 M☉</span>
                        </button>
                    </div>
                </div>

                <div class="mb-4 border-t border-white/20 pt-4">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-sm font-semibold text-gray-400" for="gr-toggle">廣義相對論 (1PN 近似)</label>
                        <input type="checkbox" id="gr-toggle" class="w-4 h-4 accent-purple-500">
                    </div>
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between text-xs text-gray-400">
                            <span>光速縮放 (放大 GR 效應)</span>
                            <span id="c-scale-display">1.000x</span>
                        </div>
                        <input type="range" id="c-scale-slider" min="-3" max="0" step="0.1" value="0"
                            class="w-full accent-purple-500" disabled>
                    </div>
                </div>

                <div>
                    <p class="text-sm font-semibold text-gray-400 mb-2">模擬速度</p>
                    <input type="range" id="speed-slider" min="1" max="100" value="20" class="w-full accent-blue-500">
                </div>
            </div>
        </div>

        <div id="tip-text"
            class="pointer-events-auto text-center self-center bg-black/60 px-6 py-2 rounded-full border border-white/10 animate-pulse text-sm text-blue-200">
            💡 目前為「觀察模式」：可拖曳旋轉、右鍵平移、滾輪縮放視角
        </div>
    </div>

    <!-- 主程式 -->
    <script type="module" src="main.js"></script>
</body>

</html>
